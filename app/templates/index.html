<!DOCTYPE html>
<html>
<head>
    <title>AI Customer Support Assistant</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            margin:40px;
        }

        .container{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        textarea{
            width:100%;
            height:100px;
            margin-top:10px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            cursor:pointer;
        }

        #response{
            margin-top:25px;
            background:#eee;
            padding:15px;
            white-space:pre-wrap;
        }
    </style>

</head>

<body>

<div class="container">

<h1>🤖 AI Customer Support Assistant</h1>

<p>Ask anything about AWS.</p>

<textarea id="question"></textarea>

<br>

<button onclick="sendQuestion()">Send</button>

<div id="response"></div>

</div>

<script>

async function sendQuestion(){

    const question=document.getElementById("question").value;

    const response=await fetch("/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            question:question
        })

    });

    const data=await response.json();

    document.getElementById("response").innerHTML=data.answer;

}

</script>

</body>
</html>
